<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Interpreter</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* Exact Tech Background from Image */
            background: linear-gradient(rgba(11, 14, 20, 0.8), rgba(11, 14, 20, 0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Glowing Circuit Effect Overlay */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 80% 20%, rgba(123, 31, 162, 0.3), transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(37, 99, 235, 0.3), transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        /* Rocket Header */
        header {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .rocket-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

      .main-title {
    font-size: 38px;
    font-weight: 800;

    font-family: 'Segoe UI', 'Poppins', sans-serif;
    letter-spacing: 2px;
    margin-top: -20px;
    margin-bottom: -20px;
}
        /* Main Container */
        .container {
            display: flex;
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
        }

        /* Glass Panels with High Blur */
        .panel {
            flex: 1;
            min-width: 450px;
            height: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            margin-bottom: 10px;
            margin-top: 10px;
             overflow: hidden;
        }

        .panel:hover {
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Panel Headers */
        .panel-header {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        .title-side {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #efeff1;
        }

        .badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
              min-height: 0;      
              overflow: hidden; 
        }

        .line-nums {
            color: #64748b;
            text-align: right;
            padding-right: 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
            line-height: 1.8;
            font-size: 14px;
        }

        .code-area {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #60a5fa; 
            padding-left: 15px;
            resize: none;
            font-size: 16px;
            line-height: 1.8;
            overflow: auto;         
            white-space: pre; 
             word-wrap: normal;
        }

        /* Output Area */
        .output-area {
            flex: 1;
            padding: 25px;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            line-height: 1.8;
            color: #cbd5e1;
            overflow-y: auto;
            
        }

        .error {
            color: #ff5f56;
            font-weight: 600;
            padding: 5px 0;
        }

        .success-header {
            color: #4ade80;
            margin-bottom: 12px;
            font-weight: bold;
        }

        /* Buttons Container */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 30px;
            margin-bottom: 0px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 15px;
        }

        .btn-run {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .btn-run:hover {
            background: #10b981;
            color: white;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .btn-clear:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
    color: #94a3b8;
    font-size: 13px;

    margin-bottom: 10px;
    margin-top: -20px;   

    background: rgba(0,0,0,0.2);
    padding: 5px 15px;
    border-radius: 20px;
}

        /* Scrollbar Customization */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
   
    <h1 class="main-title">SMALL INTERPRETER</h1>
</header>

<div class="container">

    <!-- INPUT -->
    <div class="panel">
        <div class="panel-header">
            <div class="title-side">
                <i class="fa-regular fa-file-code"></i> Input Code
            </div>
            <div class="badge">C++ / Interpreter</div>
        </div>

        <div class="editor-container">
            <div id="lines" class="line-nums">1</div>
            <textarea id="code" class="code-area" spellcheck="false">Enter The Code Here</textarea>
        </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel">
        <div class="panel-header">
            <div class="title-side">
                <i class="fa-solid fa-terminal"></i> Output
            </div>
            <div class="badge">Runtime Result</div>
        </div>

        <div id="output" class="output-area">
            Ready To Run...
        </div>
    </div>

</div>

<div class="controls">
    <button class="btn btn-run" onclick="runCode()">
        <i class="fa-solid fa-play"></i> Run Code
    </button>

    <button class="btn btn-clear" onclick="clearCode()">
        <i class="fa-solid fa-broom"></i> Clear
    </button>
    
</div>
 <footer>
    Built with Node.js + C++ Interpreter 
</footer>

<script>
const codeArea = document.getElementById("code");
const lines = document.getElementById("lines");

/* 🔥 Dynamic Line Numbers */
function updateLines() {
    const count = codeArea.value.split("\n").length;
    let nums = "";
    for (let i = 1; i <= count; i++) {
        nums += i + "<br>";
    }
    lines.innerHTML = nums;
}

/* scroll sync */
codeArea.addEventListener("scroll", () => {
    lines.scrollTop = codeArea.scrollTop;
});

/* typing update */
codeArea.addEventListener("input", updateLines);

/* initial load */
updateLines();


function runCode() {
    let code = document.getElementById("code").value;

    fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: code })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.output;
    })
    .catch(err => {
        document.getElementById("output").innerText = "Error connecting to server";
    });
}

function clearCode() {
    document.getElementById("code").value = "";
    document.getElementById("output").innerText = "Cleared...";
}
</script>

</body>
</html>
